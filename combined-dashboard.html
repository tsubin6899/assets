<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>投資理財整合儀表板｜阿斌Tsubin</title>
  <style>
    :root {
      --bg: #f4f8fb;
      --ink: #142033;
      --muted: #667485;
      --line: #dfe6ee;
      --surface: #ffffff;
      --navy: #101c34;
      --blue: #2368d8;
      --green: #24b370;
      --shadow: 0 14px 34px rgba(21, 32, 49, .08);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background: var(--bg);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
    }
    .shell {
      width: min(1500px, calc(100vw - 28px));
      margin: 14px auto 28px;
      padding: 20px;
      border: 1px solid var(--line);
      border-radius: 22px;
      background: rgba(255,255,255,.86);
      box-shadow: var(--shadow);
    }
    .hero {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      gap: 16px;
      align-items: end;
      padding: 26px;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: linear-gradient(90deg, #dfeeff 0%, #f8fbff 50%, #fff 100%);
    }
    h1 { margin: 0; font-size: 32px; line-height: 1.18; letter-spacing: 0; }
    p { margin: 9px 0 0; color: var(--muted); font-size: 14px; }
    .controls {
      display: flex;
      flex-wrap: wrap;
      justify-content: flex-end;
      gap: 10px;
    }
    button, a.button {
      min-height: 38px;
      border: 0;
      border-radius: 999px;
      padding: 8px 16px;
      background: #eef3f8;
      color: var(--ink);
      font: inherit;
      font-weight: 800;
      text-decoration: none;
      cursor: pointer;
      white-space: nowrap;
    }
    button.active { background: var(--navy); color: #fff; }
    a.button { background: var(--blue); color: #fff; }
    .frames {
      display: grid;
      gap: 16px;
      margin-top: 18px;
    }
    .frames.side-by-side {
      grid-template-columns: minmax(0, 1fr) minmax(0, 1fr);
      align-items: start;
    }
    .frame-panel {
      display: none;
      overflow: hidden;
      border: 1px solid var(--line);
      border-radius: 18px;
      background: var(--surface);
      box-shadow: 0 10px 26px rgba(21,32,49,.05);
    }
    .frame-panel.active, .frames.side-by-side .frame-panel { display: block; }
    .frame-head {
      display: flex;
      justify-content: space-between;
      gap: 12px;
      align-items: center;
      min-height: 56px;
      padding: 12px 16px;
      border-bottom: 1px solid var(--line);
      background: #f6f8fb;
    }
    .frame-head strong { font-size: 16px; }
    iframe {
      display: block;
      width: 100%;
      height: calc(100vh - 230px);
      min-height: 720px;
      border: 0;
      background: #fff;
    }
    .frames.side-by-side iframe {
      height: calc(100vh - 238px);
      min-height: 760px;
    }
    .note {
      margin-top: 14px;
      padding: 12px 14px;
      border: 1px dashed #cfd8e3;
      border-radius: 12px;
      background: #fbfcfe;
      color: var(--muted);
      font-size: 13px;
      line-height: 1.6;
    }
    @media (max-width: 1050px) {
      .hero { grid-template-columns: 1fr; }
      .controls { justify-content: flex-start; }
      .frames.side-by-side { grid-template-columns: 1fr; }
      iframe, .frames.side-by-side iframe { height: 760px; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <section class="hero">
      <div>
        <h1>投資理財整合儀表板｜阿斌Tsubin</h1>
        <p>整合原本 Notion 台股投資儀表板與個人資產儀表板。可切換檢視，也可上下並排比較。</p>
      </div>
      <div class="controls" aria-label="儀表板切換">
        <button class="active" data-mode="stock">台股投資</button>
        <button data-mode="personal">個人資產</button>
        <button data-mode="both">上下並排</button>
      </div>
    </section>

    <section class="frames" id="frames">
      <article class="frame-panel active" id="stockPanel">
        <div class="frame-head">
          <strong>台股投資儀表板</strong>
          <a class="button" href="stock-dashboard.html" target="_blank" rel="noopener">開新視窗</a>
        </div>
        <iframe src="stock-dashboard.html" title="台股投資儀表板"></iframe>
      </article>
      <article class="frame-panel" id="personalPanel">
        <div class="frame-head">
          <strong>個人資產儀表板</strong>
          <a class="button" href="personal-assets-dashboard.html" target="_blank" rel="noopener">開新視窗</a>
        </div>
        <iframe src="personal-assets-dashboard.html" title="個人資產儀表板"></iframe>
      </article>
    </section>

    <div class="note">說明：這個合併版先保留兩個原頁各自的資料與功能，避免互相覆蓋。個人資產資料仍使用瀏覽器本機儲存；若資料沒出現，請從原頁匯出 JSON 後在個人資產頁匯入。</div>
  </main>

  <script>
    const frames = document.getElementById("frames");
    const buttons = document.querySelectorAll("[data-mode]");
    const stockPanel = document.getElementById("stockPanel");
    const personalPanel = document.getElementById("personalPanel");

    function setMode(mode) {
      buttons.forEach(button => button.classList.toggle("active", button.dataset.mode === mode));
      frames.classList.toggle("side-by-side", mode === "both");
      stockPanel.classList.toggle("active", mode === "stock" || mode === "both");
      personalPanel.classList.toggle("active", mode === "personal" || mode === "both");
    }

    buttons.forEach(button => {
      button.addEventListener("click", () => setMode(button.dataset.mode));
    });
  </script>
</body>
</html>
