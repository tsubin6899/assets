<!doctype html>
<html lang="zh-Hant">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>個人資產儀表板｜阿斌Tsubin</title>
  <meta name="theme-color" content="#101c34">
  <meta name="application-name" content="阿斌資產儀表板">
  <meta name="apple-mobile-web-app-title" content="阿斌資產儀表板">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <link rel="manifest" href="manifest.webmanifest">
  <link rel="icon" type="image/png" sizes="192x192" href="icons/icon-192.png">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
  <style>
    :root {
      --bg: #edf0f2;
      --ink: #20242c;
      --muted: #77716a;
      --line: rgba(214, 219, 224, .95);
      --surface: #fffdf7;
      --blue: #2f6f8f;
      --shadow: 0 24px 70px rgba(83, 92, 104, .18);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      background:
        linear-gradient(135deg, rgba(255,255,255,.48) 0 1px, transparent 1px 22px),
        linear-gradient(180deg, #f6f7f7 0, #edf0f2 360px, #e6eaed 100%);
      color: var(--ink);
      font-family: "Noto Sans TC", "Microsoft JhengHei", system-ui, sans-serif;
      -webkit-text-size-adjust: 100%;
      overscroll-behavior-y: none;
    }
    .shell {
      width: min(1500px, calc(100vw - 40px));
      margin: 22px auto 42px;
      padding: 18px;
      border: 1px solid var(--line);
      border-radius: 10px;
      background: rgba(255, 253, 247, .72);
      box-shadow: var(--shadow);
      backdrop-filter: blur(8px);
    }
    .frame-panel {
      overflow: hidden;
      border: 1px solid rgba(214, 219, 224, .95);
      border-radius: 8px;
      background: #edf0f2;
      box-shadow: 0 10px 26px rgba(21,32,49,.05);
    }
    iframe {
      display: block;
      width: 100%;
      min-height: 100vh;
      border: 0;
      background: #edf0f2;
    }
    @media (max-width: 720px) {
      body {
        background:
          linear-gradient(135deg, rgba(255,255,255,.42) 0 1px, transparent 1px 20px),
          #edf0f2;
      }
      .shell {
        width: 100%;
        margin: 0;
        padding: 0;
        border: 0;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }
      .frame-panel {
        border: 0;
        border-radius: 0;
        box-shadow: none;
        background: transparent;
      }
      iframe { min-height: 100dvh; }
    }
  </style>
</head>
<body>
  <main class="shell">
    <article class="frame-panel">
      <iframe id="assetFrame" src="personal-assets-dashboard.html" title="個人資產儀表板" scrolling="no"></iframe>
    </article>
  </main>
  <script>
    const frame = document.getElementById("assetFrame");
    function resizeFrame() {
      try {
        const doc = frame.contentDocument || frame.contentWindow.document;
        const height = Math.max(doc.documentElement.scrollHeight, doc.body.scrollHeight);
        frame.style.height = `${height}px`;
      } catch {
        frame.style.height = "1800px";
      }
    }
    frame.addEventListener("load", () => {
      resizeFrame();
      frame.contentWindow?.addEventListener("resize", resizeFrame);
      setInterval(resizeFrame, 600);
    });
    window.addEventListener("resize", resizeFrame);
    if ("serviceWorker" in navigator && location.protocol.startsWith("http")) {
      window.addEventListener("load", () => {
        navigator.serviceWorker.register("service-worker.js").catch(() => {});
      });
    }
  </script>
</body>
</html>
